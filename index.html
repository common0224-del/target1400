<head>
  <meta charset="UTF-8" />

  <title>Vocab Test App</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --primaryText: #ffffff;
      --okBg: #ecfdf5;
      --okLine: #10b981;
      --ngBg: #fef2f2;
      --ngLine: #ef4444;
      --soft: #f9fafb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.04);
    }
    .section { padding: 16px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 28px; font-weight: 800; }
    h2 { font-size: 20px; font-weight: 800; }
    h3 { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .sub { color: var(--muted); line-height: 1.6; margin-top: 8px; font-size: 14px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .range-btn, .count-btn, .opt-btn, .ghost-btn, .primary-btn, .icon-btn {
      appearance: none; border: 1px solid var(--line); background: #fff; color: var(--text);
      border-radius: 18px; cursor: pointer;
    }
    .range-btn, .count-btn { padding: 12px; text-align: left; }
    .range-btn.active, .count-btn.active { background: var(--primary); color: var(--primaryText); border-color: var(--primary); }
    .range-btn .small { font-size: 12px; color: inherit; opacity: .75; margin-top: 4px; display: block; }
    .count-btn { text-align: center; font-weight: 700; }
    .summary-box { background: var(--soft); border: 1px solid var(--line); border-radius: 18px; padding: 12px; font-size: 14px; line-height: 1.7; }
    .primary-btn { width: 100%; background: var(--primary); color: var(--primaryText); border-color: var(--primary); padding: 14px; font-size: 16px; font-weight: 800; }
    .primary-btn:disabled { opacity: .45; cursor: not-allowed; }
    .ghost-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 700; background: #fff; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .progress-wrap { padding: 14px 16px 10px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; z-index: 2; }
    .progress-bar { width: 100%; height: 8px; background: #eceef2; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; width: 100%; background: #111827; transition: width 1s linear; }
    .word-box { background: var(--soft); border: 1px solid var(--line); border-radius: 24px; padding: 16px; }
    .word { font-size: 34px; font-weight: 800; letter-spacing: .2px; word-break: break-word; }
    .tiny { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .icon-btn { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; }
    .opts { display: grid; gap: 8px; }
    .opt-btn { width: 100%; text-align: left; padding: 14px; font-size: 14px; line-height: 1.6; }
    .opt-btn.none { background: var(--soft); }
    .opt-btn.correct { background: var(--okBg); border-color: var(--okLine); }
    .opt-btn.wrong { background: var(--ngBg); border-color: var(--ngLine); }
    .result-card { margin-top: 8px; background: #fff; border: 1px solid var(--line); border-radius: 24px; padding: 14px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 800; font-size: 15px; margin-bottom: 10px; }
    .ok { color: #047857; }
    .ng { color: #b91c1c; }
    .result-body { display: grid; gap: 8px; font-size: 14px; line-height: 1.7; }
    .example-row { display: flex; align-items: flex-start; gap: 8px; }
    .example-text { flex: 1; }
    .score-big { font-size: 52px; font-weight: 800; text-align: center; }
    .split { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .tile { border-radius: 18px; padding: 12px; text-align: center; font-size: 14px; }
    .tile.ok { background: var(--okBg); color: #065f46; }
    .tile.ng { background: var(--ngBg); color: #991b1b; }
    .history-card { background: #fff; border-radius: 22px; border: 1px solid var(--line); padding: 14px; margin-top: 10px; }
    .history-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .status-pill { font-size: 12px; padding: 4px 8px; border-radius: 999px; font-weight: 700; }
    .status-pill.ok { background: var(--okBg); color: #065f46; }
    .status-pill.ng { background: var(--ngBg); color: #991b1b; }
    .mt-12 { margin-top: 12px; }
    .hidden { display: none !important; }
  </style>
</head>

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function sample(arr, n) { return shuffle(arr).slice(0, n); }

    function inferVerbType(meaning) {
      return (meaning.startsWith('を') || meaning.startsWith('に') || meaning.includes('を')) ? 'transitive' : 'intransitive';
    }

    function genericExample(entry) {
      if (entry.pos === 'verb') {
        if (inferVerbType(entry.meaning) === 'transitive') {
          return [`Our teacher asked us to ${entry.word} the main idea in one sentence.`, `先生は私たちに主な考えを1文で表すよう求めた。`];
        }
        return [`Students often ${entry.word} when they work in groups.`, `生徒はグループで活動するときによくそのように行動する。`];
      }
      if (entry.pos === 'adjective') {
        return [`This method is simple but very ${entry.word}.`, `この方法は簡単だが、その語の意味に合う特徴をもっている。`];
      }
      if (entry.pos === 'adverb') {
        return [`She answered the question ${entry.word}.`, `彼女はその質問にそのように答えた。`];
      }
      return [`The lesson gave us a better understanding of ${entry.word}.`, `その授業で私たちは ${entry.word} への理解を深めた。`];
    }

    function makeExample(entry) {
      return EXAMPLE_BANK[entry.word] || genericExample(entry);
    }

    function toggleRange(range) {
      const exists = state.selectedRanges.some(r => r.start === range.start && r.end === range.end);
      if (exists) {
        state.selectedRanges = state.selectedRanges.filter(r => !(r.start === range.start && r.end === range.end));
      } else {
        state.selectedRanges = [...state.selectedRanges, range].sort((a, b) => a.start - b.start);
      }
      render();
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = /^[A-Za-z0-9 .,'"!?;:()\-]+$/.test(text) ? 'en-US' : 'ja-JP';
      u.rate = 0.95;
      window.speechSynthesis.speak(u);
    }

    function buildQuestions() {
      const activeRanges = state.selectedRanges.length ? state.selectedRanges : [RANGE_OPTIONS[0]];
      const pool = vocab.filter(v => activeRanges.some(r => v.no >= r.start && v.no <= r.end));
      const picked = sample(pool, Math.min(state.questionCount, pool.length));
      return picked.map((entry, idx) => {
        const samePos = pool.filter(v => v.word !== entry.word && v.meaning !== entry.meaning && v.pos === entry.pos);
        const fallback = pool.filter(v => v.word !== entry.word && v.meaning !== entry.meaning);
        const distractorPool = samePos.length >= 4 ? samePos : fallback;
        const distractors = sample(distractorPool.map(v => v.meaning), 8);
        const useNone = Math.random() < 0.25;
        const fakeCorrect = useNone ? sample(distractors, 1)[0] : entry.meaning;
        const optionsCore = shuffle([fakeCorrect, ...sample(distractors.filter(x => x !== fakeCorrect), 3)]).map(label => ({
          label,
          isCorrect: !useNone && label === entry.meaning,
        }));
        const options = [...optionsCore, { label: 'この中に正解はない', isCorrect: useNone, isNone: true }];
        const [example, translation] = makeExample(entry);
        return { ...entry, id: `${entry.word}-${idx}`, useNone, options, example, translation };
      });
    }

    function resetQuiz() {
      clearInterval(state.timerId);
      state.questions = buildQuestions();
      state.currentIndex = 0;
      state.timeLeft = 10;
      state.selectedLabel = null;
      state.reveal = false;
      state.score = 0;
      state.results = [];
      state.screen = 'quiz';
      render();
      startTimer();
      autoSpeakCurrentWord();
    }

    function startTimer() {
      clearInterval(state.timerId);
      state.timeLeft = 10;
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          clearInterval(state.timerId);
          revealAnswer(null, true);
        }
        render();
      }, 1000);
    }

    function currentQuestion() {
      return state.questions[state.currentIndex];
    }

    function autoSpeakCurrentWord() {
      const q = currentQuestion();
      if (!q) return;
      setTimeout(() => speak(q.word), 250);
    }

    function revealAnswer(label, timedOut = false) {
      if (state.reveal) return;
      clearInterval(state.timerId);
      const q = currentQuestion();
      state.selectedLabel = label;
      state.reveal = true;
      const selected = q.options.find(o => o.label === label);
      const correct = timedOut ? false : !!selected?.isCorrect;
      if (correct) state.score += 1;
      state.results.push({
        word: q.word,
        meaning: q.meaning,
        example: q.example,
        translation: q.translation,
        correct,
        selected: timedOut ? '時間切れ' : label,
        correctText: q.useNone ? 'この中に正解はない' : q.meaning,
      });
      render();
    }

    function nextQuestion() {
      if (state.currentIndex >= state.questions.length - 1) {
        state.screen = 'summary';
        clearInterval(state.timerId);
        render();
        return;
      }
      state.currentIndex += 1;
      state.timeLeft = 10;
      state.selectedLabel = null;
      state.reveal = false;
      render();
      startTimer();
      autoSpeakCurrentWord();
    }

    function goHome() {
      clearInterval(state.timerId);
      state.screen = 'home';
      render();
    }

    function homeHTML() {
      return `
        <div class="card">
          <div class="section">
            <h1>Vocab Test App</h1>
            <p class="sub">出題範囲は複数選択できます。問題数を選んでからスタートしてください。</p>
          </div>
          <div class="section" style="padding-top:0; display:grid; gap:16px;">
            <div>
              <h3>出題範囲</h3>
              <div class="grid-2">
                ${RANGE_OPTIONS.map(r => {
                  const active = state.selectedRanges.some(x => x.start === r.start && x.end === r.end);
                  return `<button class="range-btn ${active ? 'active' : ''}" onclick='toggleRange(${JSON.stringify(r)})'>
                    <div style="font-weight:800;">${r.label}</div>
                    <span class="small">No.${r.start}〜${r.end}</span>
                  </button>`;
                }).join('')}
              </div>
            </div>
            <div>
              <h3>出題数</h3>
              <div class="grid-3">
                ${[5,10,20].map(n => `<button class="count-btn ${state.questionCount === n ? 'active' : ''}" onclick="setQuestionCount(${n})">${n}問</button>`).join('')}
              </div>
            </div>
            <div class="summary-box">
              <div><strong>選択中：</strong>${state.selectedRanges.length ? state.selectedRanges.map(r => r.label).join(', ') : 'なし'}</div>
              <div><strong>問題数：</strong>${state.questionCount}問</div>
            </div>
            <button class="primary-btn" ${state.selectedRanges.length ? '' : 'disabled'} onclick="resetQuiz()">スタート</button>
          </div>
        </div>`;
    }

    function quizHTML() {
      const q = currentQuestion();
      if (!q) return '';
      const progress = Math.max(0, (state.timeLeft / 10) * 100);
      const correctOption = q.options.find(o => o.isCorrect);
      return `
        <div class="card">
          <div class="progress-wrap">
            <div class="row" style="font-size:14px;color:var(--muted);">
              <span>${state.selectedRanges.map(r => r.label).join(', ')}</span>
              <span>第 ${state.currentIndex + 1} 問 / ${state.questions.length}</span>
            </div>
            <div class="row" style="margin-top:6px;font-size:14px;color:var(--muted);">
              <span>正解 ${state.score}</span>
              <span>残り ${state.timeLeft} 秒</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          </div>
          <div class="section" style="display:grid; gap:14px;">
            <div class="word-box">
              <div class="row">
                <div>
                  <div class="tiny">英語の意味を選ぶ</div>
                  <div class="word">${q.word}</div>
                </div>
                <button class="icon-btn" onclick="speak(${JSON.stringify(q.word)})">🔊</button>
              </div>
            </div>
            <div class="opts">
              ${q.options.slice(0,4).map(opt => {
                let cls = '';
                if (state.reveal) {
                  if (opt.isCorrect) cls = 'correct';
                  else if (state.selectedLabel === opt.label) cls = 'wrong';
                }
                return `<button class="opt-btn ${cls}" ${state.reveal ? 'disabled' : ''} onclick="revealAnswer(${JSON.stringify(opt.label)})">${opt.label}</button>`;
              }).join('')}
              ${(() => {
                const opt = q.options[4];
                let cls = 'none';
                if (state.reveal) {
                  if (opt.isCorrect) cls += ' correct';
                  else if (state.selectedLabel === opt.label) cls += ' wrong';
                }
                return `<button class="opt-btn ${cls}" ${state.reveal ? 'disabled' : ''} onclick="revealAnswer(${JSON.stringify(opt.label)})">この中に正解はない</button>`;
              })()}
            </div>
            ${state.reveal ? `
              <div class="result-card">
                <div class="badge ${state.selectedLabel && correctOption && state.selectedLabel === correctOption.label ? 'ok' : 'ng'}">
                  ${state.selectedLabel && correctOption && state.selectedLabel === correctOption.label ? '✅ 正解' : '❌ 不正解'}
                </div>
                <div class="result-body">
                  <div><strong>語義：</strong>${q.meaning}</div>
                  <div><strong>正解：</strong>${q.useNone ? 'この中に正解はない' : q.meaning}</div>
                  <div class="example-row">
                    <div class="example-text"><strong>例文：</strong>${q.example}</div>
                    <button class="icon-btn" onclick="speak(${JSON.stringify(q.example)})">🔊</button>
                  </div>
                  <div><strong>訳：</strong>${q.translation}</div>
                </div>
                <div class="mt-12"><button class="primary-btn" onclick="nextQuestion()">${state.currentIndex === state.questions.length - 1 ? '結果を見る' : '次の問題へ'}</button></div>
              </div>
            ` : ''}
          </div>
        </div>`;
    }

    function summaryHTML() {
      return `
        <div class="card">
          <div class="section" style="text-align:center; display:grid; gap:14px;">
            <h2>結果</h2>
            <div class="sub">範囲: ${state.selectedRanges.map(r => r.label).join(', ')}</div>
            <div class="score-big">${state.score}<span style="font-size:22px; font-weight:700;"> / ${state.questions.length}</span></div>
            <div class="split">
              <div class="tile ok">正解<br><span style="font-size:24px;font-weight:800;">${state.score}</span></div>
              <div class="tile ng">不正解<br><span style="font-size:24px;font-weight:800;">${state.questions.length - state.score}</span></div>
            </div>
            <div class="split">
              <button class="ghost-btn" onclick="goHome()">ホーム</button>
              <button class="primary-btn" onclick="resetQuiz()">再挑戦</button>
            </div>
          </div>
        </div>
        ${state.results.map((r, i) => `
          <div class="history-card">
            <div class="history-head">
              <div style="font-size:20px;font-weight:800;">${i + 1}. ${r.word}</div>
              <span class="status-pill ${r.correct ? 'ok' : 'ng'}">${r.correct ? '正解' : '不正解'}</span>
            </div>
            <div style="display:grid; gap:8px; font-size:14px; line-height:1.7;">
              <div><strong>意味：</strong>${r.meaning}</div>
              <div class="example-row">
                <div class="example-text"><strong>例文：</strong>${r.example}</div>
                <button class="icon-btn" onclick="speak(${JSON.stringify(r.example)})">🔊</button>
              </div>
              <div><strong>訳：</strong>${r.translation}</div>
            </div>
          </div>`).join('')}
      `;
    }

    function render() {
      const app = document.getElementById('app');
      if (state.screen === 'home') app.innerHTML = homeHTML();
      else if (state.screen === 'quiz') app.innerHTML = quizHTML();
      else app.innerHTML = summaryHTML();
    }

    function setQuestionCount(n) { state.questionCount = n; render(); }

    window.toggleRange = toggleRange;
    window.setQuestionCount = setQuestionCount;
    window.resetQuiz = resetQuiz;
    window.revealAnswer = revealAnswer;
    window.nextQuestion = nextQuestion;
    window.goHome = goHome;
    window.speak = speak;

    render();
  </script>
</body>
</html>
